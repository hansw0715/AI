<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kill Banner Motion</title>
<style>
  :root{ --kb:#f2f6f7; --disc:#02090c; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Courier New",monospace;
    background:radial-gradient(circle at 50% 40%, #102a30 0%, #08171c 55%, #020809 100%);
    overflow:hidden; }
  .scan{ position:fixed; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(242,246,247,.035) 0 1px, transparent 1px 3px); }

  /* 화면 하단 중앙 */
  .kb-wrap{ position:fixed; left:50%; bottom:9%; transform:translateX(-50%);
    width:220px; text-align:center; opacity:0; }
  .reticle{ position:relative; width:220px; height:220px; margin:0 auto; }
  .reticle svg circle[fill="none"]{ filter:drop-shadow(0 0 4px var(--kb)); }
  .frame{ filter:drop-shadow(0 0 3px var(--kb)); }
  .skull{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:100px; height:100px; filter:drop-shadow(0 0 6px rgba(242,246,247,.45)); }
  .ringA{ transform-origin:110px 110px; animation:spinCW 9s linear infinite; }
  .ringB{ transform-origin:110px 110px; animation:spinCCW 6s linear infinite; }
  @keyframes spinCW{ to{ transform:rotate(360deg);} }
  @keyframes spinCCW{ to{ transform:rotate(-360deg);} }

  .flash{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:200px; height:200px; border-radius:50%; opacity:0; pointer-events:none;
    background:radial-gradient(circle, var(--kb), transparent 70%); }
  .shock{ position:absolute; left:50%; top:50%; width:140px; height:140px; margin:-70px 0 0 -70px;
    border-radius:50%; border:2px solid var(--kb); opacity:0; pointer-events:none; }
  .pt{ position:absolute; left:50%; top:50%; width:0; height:0; pointer-events:none; z-index:6; }
  .pt i{ position:absolute; left:0; top:0; border-radius:50%; background:var(--kb); box-shadow:0 0 4px var(--kb); }

  /* ── 모션 ── */
  .play{ animation:slam .34s cubic-bezier(.2,1.5,.4,1) both; }
  .play .flash{ animation:flash .45s ease-out both; }
  .play .shock{ animation:shock .55s ease-out both; }
  .out{ animation:fadeOut .4s ease-in forwards; }
  @keyframes slam{
    0%{ opacity:0; transform:translateX(-50%) scale(1.45); filter:blur(6px); }
    60%{ opacity:1; filter:blur(0); }
    80%{ transform:translateX(-50%) scale(.97); }
    100%{ opacity:1; transform:translateX(-50%) scale(1); } }
  @keyframes flash{ 0%{ opacity:.85; } 100%{ opacity:0; } }
  @keyframes shock{ 0%{ opacity:.8; transform:scale(.4);} 100%{ opacity:0; transform:scale(2);} }
  @keyframes fadeOut{ 0%{ opacity:1; } 100%{ opacity:0; transform:translateX(-50%) scale(1.1); } }
</style>
</head>
<body>
  <div class="scan"></div>

  <div id="kb" class="kb-wrap">
    <div class="reticle">
      <div class="flash"></div>
      <div class="shock"></div>

      <svg viewBox="0 0 220 220" style="position:absolute; inset:0;">
        <g class="frame">
          <g fill="none" stroke="var(--kb)" stroke-width="2" stroke-linecap="round">
            <path d="M209.14 129.27 A101 101 0 0 1 129.27 209.14"/>
            <path d="M90.73 209.14 A101 101 0 0 1 10.86 129.27"/>
            <path d="M10.86 90.73 A101 101 0 0 1 90.73 10.86"/>
            <path d="M129.27 10.86 A101 101 0 0 1 209.14 90.73"/>
          </g>
          <g stroke="var(--kb)" stroke-linecap="round" fill="none">
            <g stroke-width="3">
              <line x1="110" y1="22" x2="110" y2="5"/><line x1="110" y1="198" x2="110" y2="215"/>
              <line x1="22" y1="110" x2="5" y2="110"/><line x1="198" y1="110" x2="215" y2="110"/>
            </g>
            <g stroke-width="2.5">
              <path d="M95.11 4.04 A107 107 0 0 1 124.89 4.04"/>
              <path d="M124.89 215.96 A107 107 0 0 1 95.11 215.96"/>
              <path d="M4.04 124.89 A107 107 0 0 1 4.04 95.11"/>
              <path d="M215.96 95.11 A107 107 0 0 1 215.96 124.89"/>
            </g>
          </g>
        </g>
        <g class="ringA">
          <circle cx="110" cy="110" r="93" fill="none" stroke="var(--kb)" stroke-width="2" stroke-dasharray="6 10" opacity="0.5"/>
          <circle cx="110" cy="110" r="93" fill="none" stroke="var(--kb)" stroke-width="6" stroke-dasharray="34 120" stroke-linecap="round"/>
        </g>
        <g class="ringB">
          <circle cx="110" cy="110" r="85" fill="none" stroke="var(--kb)" stroke-width="2" stroke-dasharray="2 7" opacity="0.7"/>
          <circle cx="110" cy="110" r="85" fill="none" stroke="var(--kb)" stroke-width="5" stroke-dasharray="20 210" stroke-linecap="round"/>
        </g>
        <circle cx="110" cy="110" r="76" fill="var(--disc)" stroke="var(--kb)" stroke-width="2.5"/>
      </svg>

      <svg viewBox="0 0 100 100" class="skull">
        <defs>
          <linearGradient id="skSplit" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#fcfefe"/><stop offset="49%" stop-color="#edf2f3"/><stop offset="50%" stop-color="#a8b3b7"/><stop offset="100%" stop-color="#8d9a9e"/>
          </linearGradient>
        </defs>
        <g transform="translate(0 4.5)">
          <path d="M50 7 L32 11 L20 23 L16 39 L22 54 L31 60 L34 72 L45 84 L50 80 L55 84 L66 72 L69 60 L78 54 L84 39 L80 23 L68 11 Z" fill="url(#skSplit)"/>
          <path d="M22 40 L45 47 L42 55 L27 53 Z" fill="var(--disc)"/>
          <path d="M78 40 L55 47 L58 55 L73 53 Z" fill="var(--disc)"/>
          <path d="M50 59 L45 69 L50 67 L55 69 Z" fill="var(--disc)"/>
          <g stroke="var(--disc)" stroke-width="1.3" stroke-linecap="round" opacity="0.85">
            <line x1="46" y1="72" x2="45" y2="79"/><line x1="50" y1="73" x2="50" y2="80"/><line x1="54" y1="72" x2="55" y2="79"/>
          </g>
        </g>
      </svg>

      <div id="pt" class="pt"></div>
    </div>
  </div>

<script>
  var wrap=document.getElementById('kb'), pt=document.getElementById('pt');
  function burst(){
    for(var i=0;i<28;i++){
      var a=Math.random()*Math.PI*2, dist=46+Math.random()*60, d=320+Math.random()*240;
      var s=2+Math.random()*3, half=s/2;
      var dot=document.createElement('i');
      dot.style.width=s+'px'; dot.style.height=s+'px';
      pt.appendChild(dot);
      var dx=Math.cos(a)*dist, dy=Math.sin(a)*dist;
      var anim=dot.animate([
        {transform:'translate('+(-half)+'px,'+(-half)+'px) scale(1)', opacity:1, offset:0},
        {opacity:1, offset:0.5},
        {transform:'translate('+(dx-half)+'px,'+(dy-half)+'px) scale(.4)', opacity:0, offset:1}
      ],{duration:d, easing:'cubic-bezier(.12,.85,.25,1)'});
      (function(node){ anim.onfinish=function(){ node.remove(); }; })(dot);
    }
  }
  function play(){
    wrap.classList.remove('play','out'); void wrap.offsetWidth;
    wrap.classList.add('play'); burst();
    setTimeout(function(){ wrap.classList.add('out'); }, 1800);
  }
  play(); setInterval(play, 2800);
</script>
</body>
</html>
